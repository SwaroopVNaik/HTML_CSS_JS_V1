<!--Block Level-->
<!--div is a block level element always starts with new line-->
<div>Good Morning</div>
<h2 style="background-color: red;">Good Afternoon</h2>
<p>Good Night</p>
<hr>
<!--Inline Level-->
<a>Good Morning</a>
<i style="background-color: red;">Good Afternoon</i>
<span>Good Night</span>
