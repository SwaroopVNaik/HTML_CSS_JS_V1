<html>
    <head>
        <title>Events  and DOM</title>
        <script src="./event.js" type="text/javascript"></script>
    </head>
    <body>
        <button onmouseover="changeColor1()" 
                id="btn1" 
                style="background-color: yellow;"
                >Mouse Over</button>

        <br>
        <br>

        <button onmouseout="changeColor2()"
                id="btn2"
                style="background-color: black;"
                class="btnstyle1">Mouse Out</button>

        <br>
        <br>

        <button class="btnStyles2" 
                onclick="changeColor3()" 
                style="background-color: red;">Click</button>
    </body>
</html>
